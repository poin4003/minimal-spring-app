upstream minimal_spring_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Direct uploads are limited to 16 MB and chunks are currently 8 MB.
    client_max_body_size 20m;

    location / {
        proxy_pass http://minimal_spring_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Overwrite client-provided forwarding headers to prevent IP spoofing.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # Stream uploads to Spring instead of buffering the complete request.
        proxy_request_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
