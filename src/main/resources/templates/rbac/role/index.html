<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${page.title}">Roles</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/shell.css}">
    <script defer th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="app-shell bg-body-tertiary">
    <div class="container-fluid px-0 py-0">
        <div class="row g-0 align-items-stretch app-shell-row">
            <aside class="col-12 col-lg-3 col-xxl-2">
                <div class="card app-sidebar-panel shadow-sm border-0">
                    <div class="card-body p-3 p-lg-4">
                        <p class="app-menu-caption mb-2">Menu</p>
                        <h1 class="h3 mb-2" th:text="${page.shell.title}">Minimal Spring App</h1>
                        <p class="text-secondary mb-4">Internal control panel</p>

                        <div th:replace="~{fragments/menu :: tree(${page.shell.menuTree})}"></div>
                    </div>
                </div>
            </aside>

            <section class="col-12 col-lg-9 col-xxl-10">
                <div class="card app-content-panel shadow-sm border-0">
                    <div class="card-body p-0">
                        <header class="app-header d-flex flex-column flex-md-row align-items-md-center justify-content-md-between gap-3 px-4 py-3 border-bottom">
                            <div>
                                <p class="text-secondary small mb-1">Signed in as</p>
                                <div class="fw-semibold text-break" th:text="${page.shell.currentUser.email}">
                                    system@admin.com
                                </div>
                            </div>

                            <form method="post" th:attr="action=${page.shell.logoutPath}" class="ms-md-auto mb-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-outline-secondary app-header-action">
                                    Sign out
                                </button>
                            </form>
                        </header>

                        <div class="p-4 p-lg-5 d-grid gap-4">
                            <section class="d-flex flex-column flex-md-row align-items-md-center justify-content-md-between gap-3">
                                <div>
                                    <p class="text-secondary mb-2">RBAC</p>
                                    <h2 class="h3 mb-2" th:text="${page.heading}">Roles</h2>
                                    <p class="text-secondary mb-0" th:text="${page.description}">
                                        Create roles and review access groups available in the system.
                                    </p>
                                </div>

                                <div th:if="${page.createRoleModal != null}"
                                     th:replace="~{fragments/components/modal :: modal(${page.createRoleModal})}"></div>
                            </section>

                            <div th:if="${page.successMessage != null}"
                                 class="alert alert-success mb-0"
                                 th:text="${page.successMessage}">
                                Role created successfully.
                            </div>

                            <div th:if="${page.errorMessage != null}"
                                 class="alert alert-danger mb-0"
                                 th:text="${page.errorMessage}">
                                Please correct the form and try again.
                            </div>

                            <div th:replace="~{fragments/components/table :: table(${page.roleTable})}"></div>

                            <th:block th:if="${page.roleDetailModal != null}">
                                <div th:replace="~{rbac/role/fragments/detail-modal :: modal(${page.roleDetailModal})}"></div>
                            </th:block>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script th:if="${page.openCreateRoleModal}">
        document.addEventListener("DOMContentLoaded", function () {
            bootstrap.Modal.getOrCreateInstance(document.getElementById("create-role-modal")).show();
        });
    </script>

    <script th:if="${page.openRoleDetailModal}">
        document.addEventListener("DOMContentLoaded", function () {
            bootstrap.Modal.getOrCreateInstance(document.getElementById("role-detail-modal")).show();
        });
    </script>
</body>
</html>
