<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${page.title}">Sign in</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
</head>
<body class="bg-body-tertiary">
    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center align-items-center g-4">
                <div class="col-lg-6">
                    <div class="pe-lg-5">
                        <p class="text-uppercase text-secondary fw-semibold small mb-3"
                           th:text="${page.applicationTitle}">
                            Minimal Spring App
                        </p>
                        <h1 class="display-5 fw-bold mb-3">Sign in to the Minimal Spring App</h1>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">
                            <h2 class="h3 mb-2" th:text="${page.title}">Sign in</h2>
                            <p class="text-secondary mb-4">
                                Use your system account to access the Minimal Spring App.
                            </p>

                            <div class="alert alert-danger" th:if="${page.hasError}" role="alert">
                                Invalid email or password.
                            </div>

                            <div class="alert alert-success" th:if="${page.loggedOut}" role="alert">
                                You have been signed out.
                            </div>

                            <form method="post" th:attr="action=${page.loginPath}" class="d-grid gap-3">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div>
                                    <label for="email" class="form-label">Email</label>
                                    <input
                                        id="email"
                                        type="email"
                                        name="email"
                                        class="form-control"
                                        placeholder="system@admin.com"
                                        autocomplete="username"
                                        required>
                                </div>

                                <div>
                                    <label for="password" class="form-label">Password</label>
                                    <input
                                        id="password"
                                        type="password"
                                        name="password"
                                        class="form-control"
                                        placeholder="Enter your password"
                                        autocomplete="current-password"
                                        required>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg">
                                    Sign in
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
