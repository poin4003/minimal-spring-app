<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="upload(upload)">
    <div class="d-flex justify-content-end">
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                th:data-bs-target="${'#' + upload.id + '-modal'}"
                th:text="${upload.triggerLabel}">
            Upload Media
        </button>
    </div>

    <div th:replace="~{media/fragments/upload-modal :: modal(${upload})}"></div>
</div>
</body>
</html>
