<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="result(result)"
     class="alert alert-success mb-0"
     role="status"
     data-media-upload-result
     th:data-media-id="${result.media.id}"
     th:data-original-name="${result.media.originalName}"
     th:data-processing-status="${result.media.processingStatus}"
     th:data-thumbnail-url="${result.media.thumbnailUrl}">
    <div class="fw-semibold" th:text="${result.message}">
        Media uploaded successfully.
    </div>
    <div class="small mt-1 text-break"
         th:text="${result.media.originalName}">
        image.png
    </div>
</div>
</body>
</html>
