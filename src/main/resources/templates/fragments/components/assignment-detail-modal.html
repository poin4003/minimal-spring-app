<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal(modal)"
     class="modal fade"
     th:id="${modal.id}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title fs-5 mb-1" th:text="${modal.title}">
                        Detail
                    </h2>
                    <div class="text-secondary small mb-0 d-flex flex-wrap gap-3"
                         th:if="${!#lists.isEmpty(modal.metadata)}">
                        <span th:each="meta : ${modal.metadata}">
                            <span th:text="${meta.label + ': '}">Label: </span>
                            <code th:if="${meta.monospace}" th:text="${meta.value}">value</code>
                            <span th:unless="${meta.monospace}" th:text="${meta.value}">value</span>
                        </span>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <div class="row g-4">
                    <div class="col-lg-6">
                        <h3 class="h6 mb-3" th:text="${modal.assignedTitle}">Assigned Items</h3>

                        <div class="list-group" th:if="${!#lists.isEmpty(modal.assignedItems)}">
                            <div th:each="item : ${modal.assignedItems}"
                                 class="list-group-item d-flex justify-content-between align-items-start gap-3">
                                <div>
                                    <div class="fw-semibold" th:text="${item.title}">Assigned Item</div>
                                    <div th:if="${item.description != null}"
                                         class="small text-secondary"
                                         th:text="${item.description}">
                                        Description
                                    </div>
                                </div>

                                <form method="post" th:action="${item.actionPath}" class="mb-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" th:name="${item.hiddenFieldName}" th:value="${item.hiddenFieldValue}">
                                    <button type="submit"
                                            class="btn btn-sm"
                                            th:classappend="${' ' + item.actionButtonClass}"
                                            th:text="${item.actionLabel}">
                                        Remove
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div th:if="${#lists.isEmpty(modal.assignedItems)}"
                             class="text-secondary small"
                             th:text="${modal.assignedEmptyMessage}">
                            No assigned items.
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <h3 class="h6 mb-3" th:text="${modal.availableTitle}">Available Items</h3>

                        <div class="list-group" th:if="${!#lists.isEmpty(modal.availableItems)}">
                            <div th:each="item : ${modal.availableItems}"
                                 class="list-group-item d-flex justify-content-between align-items-start gap-3">
                                <div>
                                    <div class="fw-semibold" th:text="${item.title}">Available Item</div>
                                    <div th:if="${item.description != null}"
                                         class="small text-secondary"
                                         th:text="${item.description}">
                                        Description
                                    </div>
                                </div>

                                <form method="post" th:action="${item.actionPath}" class="mb-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" th:name="${item.hiddenFieldName}" th:value="${item.hiddenFieldValue}">
                                    <button type="submit"
                                            class="btn btn-sm"
                                            th:classappend="${' ' + item.actionButtonClass}"
                                            th:text="${item.actionLabel}">
                                        Assign
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div th:if="${#lists.isEmpty(modal.availableItems)}"
                             class="text-secondary small"
                             th:text="${modal.availableEmptyMessage}">
                            No available items.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
