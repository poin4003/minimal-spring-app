<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal(modal)"
     class="modal fade"
     th:id="${modal.id}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" th:attr="action=${modal.actionPath}">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="modal-header">
                    <h2 class="modal-title fs-5" th:text="${modal.title}">Confirm action</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <p class="mb-0" th:text="${modal.description}">Are you sure?</p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Cancel
                    </button>
                    <button type="submit"
                            class="btn"
                            th:classappend="${modal.confirmButtonClass != null ? ' ' + modal.confirmButtonClass : ' btn-primary'}"
                            th:text="${modal.confirmLabel}">
                        Confirm
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
