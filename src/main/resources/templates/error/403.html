<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:with="
          viewStatus=${page != null ? page.status : (status != null ? status : 403)},
          viewTitle=${page != null ? page.title : 'Forbidden'},
          viewMessage=${page != null ? page.message : (#strings.isEmpty(message) ? 'You do not have permission to access this page.' : message)},
          viewPath=${page != null ? page.path : path}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${viewStatus + ' ' + viewTitle}">403 Forbidden</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
</head>
<body class="bg-body-tertiary">
    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card shadow-sm border-0 text-center">
                        <div class="card-body p-5">
                            <div class="display-4 fw-bold text-danger mb-3" th:text="${viewStatus}">403</div>
                            <h1 class="h3 mb-3" th:text="${viewTitle}">Forbidden</h1>
                            <p class="text-secondary mb-4" th:text="${viewMessage}">
                                You do not have permission to access this page.
                            </p>

                            <div class="d-flex justify-content-center">
                                <button type="button" class="btn btn-outline-secondary" onclick="window.history.back()">
                                    Back
                                </button>
                            </div>

                            <div class="mt-4 small text-secondary">
                                <span th:if="${viewPath != null and !#strings.isEmpty(viewPath)}">
                                    Path: <code th:text="${viewPath}">/admin</code>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
