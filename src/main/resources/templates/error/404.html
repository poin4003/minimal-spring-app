<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:with="
          viewStatus=${page != null ? page.status : (status != null ? status : 404)},
          viewTitle=${page != null ? page.title : 'Page not found'},
          viewMessage=${page != null ? page.message : (#strings.isEmpty(message) ? 'The page or resource you requested does not exist.' : message)},
          viewPath=${page != null ? page.path : path}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${viewStatus + ' ' + viewTitle}">404 Not Found</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script th:src="@{/js/app-ui.js}"></script>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app-ui.css}">
</head>
<body class="bg-body-tertiary">
    <div class="position-fixed top-0 end-0 m-3 z-3">
        <div th:replace="~{fragments/app-tools :: themeToggle}"></div>
    </div>

    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card shadow-sm border-0 text-center">
                        <div class="card-body p-5">
                            <div class="display-4 fw-bold text-warning mb-3" th:text="${viewStatus}">404</div>
                            <h1 class="h3 mb-3" th:text="${viewTitle}">Page not found</h1>
                            <p class="text-secondary mb-4" th:text="${viewMessage}">
                                The page or resource you requested does not exist.
                            </p>

                            <div class="d-flex justify-content-center">
                                <button type="button" class="btn btn-outline-secondary" onclick="window.history.back()">
                                    Back
                                </button>
                            </div>

                            <div class="mt-4 small text-secondary">
                                <span th:if="${viewPath != null and !#strings.isEmpty(viewPath)}">
                                    Path: <code th:text="${viewPath}">/missing-page</code>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/app-tools :: loader}"></div>
</body>
</html>
