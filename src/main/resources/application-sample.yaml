# Server config
server:
    port: 8080

# App config
app:
    auth:
        cookie:
            access-token-name: ACCESS_TOKEN
            refresh-token-name: REFRESH_TOKEN
            path: /
            same-site: Lax
            secure: false
    cors:
        allowed-origins:
            - "http://localhost:5173"
            - "http://localhost:3000"
            - "http://localhost:3090"
            - "http://127.0.0.1:5500"
    jwt:
        secret-key: "1234567890123456789012345678901234567890" # At least 256 bits (32 characters) for HS256
        access-token-expiration-ms: 3600000 # 1 hour
        refresh-token-expiration-ms: 604800000 # 7 days
    media:
        storage-path: ${MEDIA_STORAGE_PATH:./data/media}
        max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:10485760}
        max-image-pixels: ${MEDIA_MAX_IMAGE_PIXELS:40000000}
        allowed-types:
            - extension: jpg
              kind: IMAGE
              content-types: [image/jpeg]
            - extension: jpeg
              kind: IMAGE
              content-types: [image/jpeg]
            - extension: png
              kind: IMAGE
              content-types: [image/png]
            - extension: mp4
              kind: VIDEO
              content-types: [video/mp4]
            - extension: mp3
              kind: AUDIO
              content-types: [audio/mpeg]
            - extension: pdf
              kind: DOCUMENT
              content-types: [application/pdf]
            - extension: md
              kind: DOCUMENT
              content-types: [text/markdown, text/plain]
            - extension: zip
              kind: FILE
              content-types: [application/zip]
        ffmpeg:
            executable: ${FFMPEG_PATH:ffmpeg}
            ffprobe-executable: ${FFPROBE_PATH:ffprobe}
            segment-duration-seconds: 6
            process-timeout-minutes: 30
    security:
        api-public-paths:
            - /api/v1/auth/login
            - /api/v1/auth/refresh
        web-public-paths:
            - /login
            - /logout
            - /error
            - /favicon.ico
            - /vendor/**
            - /swagger-ui/**
            - /v3/api-docs/**
            - /h2-console/**
            - /css/**
            - /js/**
            - /images/**
        csrf-ignore-paths:
            - /api/**
            - /h2-console/**
            - /admin/users/**
            - /admin/rbac/**
            - /admin/cronjobs/**
    ui:
        login-path: /login
        home-path: /admin
        login-title: Sign in
        logout-path: /logout
        application-title: Minimal Spring App

# Spring config
spring:
    application:
        name: spring_app

    datasource:
        url: jdbc:h2:file:./data/minimal_db;AUTO_SERVER=TRUE
        driverClassName: org.h2.Driver
        username: sa
        password:

    h2:
        console:
            enabled: true
            path: /h2-console

    flyway:
        enabled: true
        table: FLYWAY_SCHEMA_HISTORY
        placeholders:
            bootstrapAdminEmail: '${BOOTSTRAP_ADMIN_EMAIL:system@admin.com}'
            bootstrapAdminPasswordHash: '${BOOTSTRAP_ADMIN_PASSWORD_HASH:$2b$10$aFCsDS3JNrk3lR/mopRPROvACMVX4rj8v0QTpalcFbuUc9YuYqwFu}'
            bootstrapAdminName: '${BOOTSTRAP_ADMIN_NAME:Tài khoản Super Admin}'

    thymeleaf:
        enabled: true
        prefix: classpath:/templates/
        suffix: .html
        mode: HTML
        cache: false

    jpa:
        show-sql: true
        hibernate:
            # ddl-auto: create
            ddl-auto: validate
        properties:
            hibernate:
                "[format_sql]": true
                "[highlight_sql]": true

    servlet:
        multipart:
            max-file-size: 500MB
            max-request-size: 500MB

    jackson:
        serialization:
            indent-output: true

    threads:
        virtual:
            enabled: true

# Swagger
springdoc:
    swagger-ui:
        path: /swagger-ui.html

# Logger
logging:
    level:
        "[org.hibernate.SQL]": DEBUG
        "[org.hibernate.orm.jdbc.bind]": TRACE

        "[org.springframework.jdbc.core]": DEBUG
        "[java.sql.Connection]": TRACE
        "[java.sql]": TRACE

org:
    jobrunr:
        background-job-server:
            enabled: true
        dashboard:
            enabled: false
            port: 8000
